<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festa Goodtimes - Ingressos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-cubes { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-12 selection:bg-pink-500/30">

    <script>
        // CONFIGURAÇÃO DO WEBHOOK
        // ⚠️ TESTE: use 'webhook-test'. PRODUÇÃO: mude para 'webhook' e ative o workflow no n8n.
        const API_WEBHOOK_URL = "https://estudio-n8n.baatq5.easypanel.host/webhook-test/ingressos"; 
        const TOTAL_TICKETS = 50;
    </script>

    <div class="relative h-64 md:h-80 bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 flex items-center justify-center overflow-hidden text-center">
        <div class="absolute inset-0 bg-cubes"></div>
        <div class="relative z-10 px-4">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-2 italic text-white drop-shadow-2xl">
                GOODTIMES <span class="text-pink-400">PARTY</span>
            </h1>
            <p class="text-xs md:text-sm font-bold text-purple-200 uppercase tracking-[0.3em] opacity-80">O melhor dos anos 80 em 2026!</p>
        </div>
    </div>

    <main class="max-w-xl mx-auto px-4 -mt-16 relative z-20">
        <!-- Contador -->
        <div class="glass rounded-3xl p-6 shadow-2xl border border-slate-800 mb-6">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-500/20 p-3 rounded-2xl text-indigo-400"><i data-lucide="ticket" class="w-6 h-6"></i></div>
                    <div>
                        <h2 class="font-bold text-lg text-white">Ingressos Online</h2>
                        <p class="text-slate-400 text-xs uppercase tracking-wider">Disponibilidade</p>
                    </div>
                </div>
                <div class="text-right">
                    <span id="remaining-count" class="text-4xl font-black text-indigo-400 leading-none">--</span>
                    <p id="remaining-label" class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mt-1">Disponíveis</p>
                </div>
            </div>
            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden border border-slate-700">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-pink-500 transition-all duration-1000" style="width: 100%"></div>
            </div>
        </div>

        <!-- Form -->
        <div id="form-container" class="glass rounded-3xl p-8 shadow-2xl border border-slate-800">
            <h3 class="text-2xl font-bold mb-8 flex items-center gap-3 text-white">
                <div class="w-2 h-8 bg-pink-500 rounded-full"></div>
                Compre seu ingresso
            </h3>

            <div id="error-message" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/30 rounded-2xl flex items-start gap-3 text-red-400 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                <p id="error-text"></p>
            </div>

            <form id="purchase-form" class="space-y-5">
                <input required type="text" id="nome" placeholder="Nome Completo" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all text-white placeholder:text-slate-700">
                <input required type="tel" id="whatsapp" placeholder="WhatsApp (00) 00000-0000" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all text-white placeholder:text-slate-700">
                <input required type="email" id="email" placeholder="Seu E-mail" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all text-white placeholder:text-slate-700">

                <button type="submit" id="submit-btn" class="w-full py-5 rounded-2xl font-black text-lg bg-gradient-to-r from-indigo-600 to-pink-600 hover:brightness-110 transition-all flex items-center justify-center gap-3 shadow-xl">
                    <span id="btn-text">Garantir meu lugar</span>
                    <i data-lucide="loader-2" id="btn-loader" class="w-6 h-6 animate-spin hidden"></i>
                </button>
            </form>
        </div>

        <!-- Sucesso -->
        <div id="success-container" class="hidden glass rounded-3xl p-8 text-center border border-emerald-500/30">
            <div class="bg-emerald-500 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/30">
                <i data-lucide="check" class="w-10 h-10 text-white"></i>
            </div>
            <h2 class="text-2xl font-bold text-emerald-400 mb-2">Reserva Confirmada!</h2>
            <div class="bg-white text-slate-900 rounded-2xl p-6 shadow-2xl my-6">
                <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">Número do Ingresso</p>
                <p id="success-ticket" class="text-6xl font-black text-indigo-600 tracking-tighter">#---</p>
            </div>
            <button onclick="location.reload()" class="text-slate-400 underline font-bold text-sm">Comprar outro</button>
        </div>

        <div class="mt-8 bg-slate-900/40 p-5 rounded-3xl border border-slate-800 flex items-center gap-4">
            <div class="bg-emerald-500/10 p-3 rounded-2xl text-emerald-400"><i data-lucide="banknote" class="w-6 h-6"></i></div>
            <div class="flex-1 flex justify-between items-center text-sm">
                <div>
                    <p class="text-[10px] uppercase font-black text-slate-500">Antecipado</p>
                    <p class="text-xl font-black text-emerald-400">R$ 10,00</p>
                </div>
                <div class="text-right border-l border-slate-800 pl-4">
                    <p class="text-[10px] uppercase font-black text-slate-500">Na Hora</p>
                    <p class="font-bold text-slate-400">R$ 20,00</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const countDisplay = document.getElementById('remaining-count');
        const progressBar = document.getElementById('progress-bar');
        const submitBtn = document.getElementById('submit-btn');

        async function updateStatus() {
            try {
                const response = await fetch(`${API_WEBHOOK_URL}?action=status&t=${Date.now()}`);
                const text = await response.text();
                if (!text) return;
                const data = JSON.parse(text);
                if(data.remaining !== undefined) {
                    const rem = Math.max(0, parseInt(data.remaining));
                    countDisplay.innerText = rem;
                    progressBar.style.width = `${(rem / TOTAL_TICKETS) * 100}%`;
                }
            } catch (err) {
                console.log("Erro ao atualizar contador.");
            }
        }

        document.getElementById('purchase-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnLoader = document.getElementById('btn-loader');
            const btnText = document.getElementById('btn-text');
            const errBox = document.getElementById('error-message');

            submitBtn.disabled = true;
            btnLoader.classList.remove('hidden');
            btnText.innerText = "Processando...";
            errBox.classList.add('hidden');

            try {
                const params = new URLSearchParams({ 
                    action: 'buy', 
                    nome: document.getElementById('nome').value, 
                    whatsapp: document.getElementById('whatsapp').value, 
                    email: document.getElementById('email').value 
                });
                
                const response = await fetch(`${API_WEBHOOK_URL}?${params.toString()}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-container').classList.remove('hidden');
                    document.getElementById('success-ticket').innerText = '#' + String(data.ticketNumber).padStart(3, '0');
                } else {
                    throw new Error(data.error || "Erro ao processar ingresso.");
                }
            } catch (err) {
                document.getElementById('error-text').innerText = "Erro de conexão. Verifique se o n8n está no modo 'Listen' ou 'Active'.";
                errBox.classList.remove('hidden');
            } finally {
                btnLoader.classList.add('hidden');
                btnText.innerText = "Garantir meu lugar";
                submitBtn.disabled = false;
            }
        });

        updateStatus();
    </script>
</body>
</html>
