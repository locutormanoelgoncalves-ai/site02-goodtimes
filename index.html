<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festa Goodtimes - Ingressos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-cubes { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px); }
        #submit-btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-12 selection:bg-pink-500/30">

    <script>
        // ⚠️ IMPORTANTE: 
        // 1. Webhook TESTE: termina em /webhook-test/ingressos (Só funciona com o n8n aberto no 'Listen')
        // 2. Webhook PRODUÇÃO: termina em /webhook/ingressos (Funciona sempre, mas o Workflow deve estar ATIVO)
        const API_WEBHOOK_URL = "https://estudio-n8n.baatq5.easypanel.host/webhook/ingressos"; 
        const TOTAL_TICKETS = 50;
        const CHAVE_PIX = "pix@manoelgoncalves.com.br";
    </script>

    <div class="relative h-64 md:h-80 bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 flex items-center justify-center overflow-hidden text-center">
        <div class="absolute inset-0 bg-cubes"></div>
        <div class="relative z-10 px-4">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-2 italic text-white">
                GOODTIMES <span className="text-pink-400">PARTY</span>
            </h1>
            <p class="text-xs md:text-sm font-bold text-purple-200 uppercase tracking-[0.3em] opacity-80 italic">O melhor dos anos 80!</p>
        </div>
    </div>

    <main class="max-w-xl mx-auto px-4 -mt-16 relative z-20">
        <!-- Contador -->
        <div class="glass rounded-3xl p-6 shadow-2xl border border-slate-800 mb-6">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-500/20 p-3 rounded-2xl text-indigo-400"><i data-lucide="ticket" class="w-6 h-6"></i></div>
                    <div>
                        <h2 class="font-bold text-lg text-white">Ingressos Online</h2>
                        <p class="text-slate-400 text-xs uppercase tracking-wider italic">Disponibilidade</p>
                    </div>
                </div>
                <div class="text-right">
                    <span id="remaining-count" class="text-4xl font-black text-indigo-400 leading-none">50</span>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mt-1">Livres</p>
                </div>
            </div>
            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden border border-slate-700">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-pink-500 transition-all duration-1000" style="width: 100%"></div>
            </div>
        </div>

        <!-- Formulário de Compra -->
        <div id="form-container" class="glass rounded-3xl p-8 shadow-2xl border border-slate-800">
            <div id="step-1">
                 <h3 class="text-xl font-bold mb-4 flex items-center gap-3 text-white">
                    <span class="bg-indigo-500 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                    Pagamento via PIX
                </h3>
                <div class="bg-slate-950/50 border border-slate-800 rounded-2xl p-6 mb-8">
                    <p class="text-3xl font-black text-emerald-400 mb-4 text-center">R$ 10,00</p>
                    <div class="flex items-center gap-2 bg-slate-900 border border-slate-700 p-3 rounded-xl">
                        <code class="flex-1 text-sm text-indigo-300 font-mono truncate" id="pix-key">pix@manoelgoncalves.com.br</code>
                        <button onclick="copyPix()" class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-lg text-xs font-bold transition-all">Copiar</button>
                    </div>
                </div>

                <h3 class="text-xl font-bold mb-6 flex items-center gap-3 text-white">
                    <span class="bg-pink-500 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                    Anexar Comprovativo
                </h3>

                <form id="purchase-form" class="space-y-4">
                    <input required type="text" id="nome" placeholder="Nome Completo" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all text-white">
                    <input required type="tel" id="whatsapp" placeholder="WhatsApp" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all text-white">
                    <input required type="email" id="email" placeholder="E-mail" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all text-white">

                    <div class="relative group cursor-pointer">
                        <input required type="file" id="comprovante" accept="image/*,application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="w-full bg-slate-950 border-2 border-dashed border-slate-800 rounded-2xl py-8 px-4 text-center group-hover:border-indigo-500 transition-all flex flex-col items-center gap-2">
                            <i data-lucide="upload-cloud" id="upload-icon" class="w-8 h-8 text-slate-500 transition-colors"></i>
                            <span id="file-label" class="text-sm text-slate-500 font-medium tracking-tight">Selecione o ficheiro</span>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" disabled class="w-full py-5 rounded-2xl font-black text-lg bg-gradient-to-r from-indigo-600 to-pink-600 hover:brightness-110 transition-all flex items-center justify-center gap-3 shadow-xl mt-4">
                        <span id="btn-text">Finalizar Ingresso</span>
                        <i data-lucide="loader-2" id="btn-loader" class="w-6 h-6 animate-spin hidden"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Sucesso -->
        <div id="success-container" class="hidden glass rounded-3xl p-8 text-center border border-emerald-500/30">
            <div class="bg-emerald-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-emerald-500/30">
                <i data-lucide="check" class="w-12 h-12 text-white"></i>
            </div>
            <h2 class="text-3xl font-bold text-emerald-400 mb-2">Pedido Enviado!</h2>
            <div class="bg-white text-slate-900 rounded-3xl p-8 shadow-2xl my-6">
                <p class="text-[10px] uppercase font-black text-slate-400 mb-2">Seu Ingresso</p>
                <p id="success-ticket" class="text-6xl font-black text-indigo-600 tracking-tighter">#---</p>
            </div>
            <button onclick="location.reload()" class="text-slate-400 underline font-bold">Voltar</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const fileInput = document.getElementById('comprovante');
        const fileLabel = document.getElementById('file-label');
        const submitBtn = document.getElementById('submit-btn');
        const uploadIcon = document.getElementById('upload-icon');

        function copyPix() {
            const temp = document.createElement('input');
            temp.value = CHAVE_PIX; document.body.appendChild(temp);
            temp.select(); document.execCommand('copy'); document.body.removeChild(temp);
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileLabel.innerText = e.target.files[0].name;
                fileLabel.classList.replace('text-slate-500', 'text-indigo-400');
                uploadIcon.classList.replace('text-slate-500', 'text-indigo-400');
                submitBtn.disabled = false;
            }
        });

        // FUNÇÃO DO CONTADOR
        async function updateStatus() {
            try {
                // Usamos fetch com 'action=status' para o n8n saber que é apenas consulta
                const response = await fetch(`${API_WEBHOOK_URL}?action=status&t=${Date.now()}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                if (data.remaining !== undefined) {
                    const rem = Math.max(0, parseInt(data.remaining));
                    document.getElementById('remaining-count').innerText = rem;
                    document.getElementById('progress-bar').style.width = `${(rem / TOTAL_TICKETS) * 100}%`;
                }
            } catch (err) {
                console.log("A aguardar Webhook do n8n...");
            }
        }

        document.getElementById('purchase-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            document.getElementById('btn-loader').classList.remove('hidden');
            document.getElementById('btn-text').innerText = "Processando...";

            try {
                const formData = new FormData();
                formData.append('action', 'buy');
                formData.append('nome', document.getElementById('nome').value);
                formData.append('whatsapp', document.getElementById('whatsapp').value);
                formData.append('email', document.getElementById('email').value);
                formData.append('comprovante', fileInput.files[0]);

                const response = await fetch(API_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.success) {
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-container').classList.remove('hidden');
                    document.getElementById('success-ticket').innerText = '#' + String(data.ticketNumber).padStart(3, '0');
                } else {
                    alert("Erro: " + data.error);
                }
            } catch (err) {
                alert("Erro de conexão com o n8n. Verifique se clicou em 'Listen for test event'.");
            } finally {
                submitBtn.disabled = false;
                document.getElementById('btn-loader').classList.add('hidden');
                document.getElementById('btn-text').innerText = "Finalizar Ingresso";
            }
        });

        // Inicia o contador
        updateStatus();
        // Atualiza a cada 30 segundos
        setInterval(updateStatus, 30000);
    </script>
</body>
</html>
