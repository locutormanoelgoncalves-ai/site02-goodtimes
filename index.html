<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festa Goodtimes - Ingressos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-cubes { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-pink-500/30 pb-12">

    <script>
        // CONFIGURAÇÃO DO N8N
        // ⚠️ IMPORTANTE: Se estiver a testar, use 'webhook-test'. Se o workflow estiver ATIVO, use 'webhook'.
        const API_WEBHOOK_URL = "https://estudio-n8n.baatq5.easypanel.host/webhook-test/ingressos"; 
        const TOTAL_TICKETS = 50;
        const SALES_CUTOFF_DATE = new Date('2026-05-02T23:59:59').getTime();
    </script>

    <div class="relative h-64 md:h-80 bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-cubes"></div>
        <div class="relative z-10 text-center px-4">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-2 italic drop-shadow-2xl">
                GOODTIMES <span class="text-pink-400">PARTY</span>
            </h1>
            <p class="text-lg md:text-xl font-medium text-purple-200 uppercase tracking-widest">A Noite Mais Esperada</p>
        </div>
    </div>

    <main class="max-w-xl mx-auto px-4 -mt-16 relative z-20">
        <div class="bg-slate-900 rounded-3xl p-6 shadow-2xl border border-slate-800 mb-6 backdrop-blur-xl bg-opacity-95">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-500/20 p-3 rounded-2xl text-indigo-400"><i data-lucide="ticket" class="w-6 h-6"></i></div>
                    <div>
                        <h2 class="font-bold text-lg">Ingressos Online</h2>
                        <p class="text-slate-400 text-xs uppercase tracking-wider">Disponibilidade</p>
                    </div>
                </div>
                <div class="text-right">
                    <span id="remaining-count" class="text-4xl font-black text-indigo-400 leading-none">--</span>
                    <p id="remaining-label" class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mt-1">Disponíveis</p>
                </div>
            </div>
            <div class="w-full bg-slate-800 h-4 rounded-full overflow-hidden border border-slate-700">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <div id="form-container" class="bg-slate-900 rounded-3xl p-8 shadow-2xl border border-slate-800 backdrop-blur-xl bg-opacity-95">
            <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">
                <div class="w-2 h-8 bg-pink-500 rounded-full"></div>
                Compre seu ingresso
            </h3>

            <div id="error-message" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/30 rounded-2xl flex items-start gap-3 text-red-400 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5 mt-0.5"></i>
                <p id="error-text"></p>
            </div>

            <form id="purchase-form" class="space-y-5">
                <input required type="text" id="nome" placeholder="Nome Completo" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all">
                <input required type="tel" id="whatsapp" placeholder="WhatsApp (00) 00000-0000" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all">
                <input required type="email" id="email" placeholder="Seu E-mail" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-6 focus:border-indigo-500 outline-none transition-all">

                <button type="submit" id="submit-btn" class="w-full py-5 rounded-2xl font-black text-lg bg-gradient-to-r from-indigo-600 to-pink-600 hover:brightness-110 transition-all flex items-center justify-center gap-3">
                    <span id="btn-text">Garantir meu lugar</span>
                    <i data-lucide="loader-2" id="btn-loader" class="w-6 h-6 animate-spin hidden"></i>
                </button>
            </form>
        </div>

        <div id="success-container" class="hidden bg-emerald-900/10 border border-emerald-500/30 rounded-3xl p-8 text-center shadow-lg">
            <div class="bg-emerald-500 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check" class="w-10 h-10 text-white"></i></div>
            <h2 class="text-2xl font-bold text-emerald-400 mb-2">Sucesso!</h2>
            <div class="bg-white text-slate-900 rounded-2xl p-6 shadow-xl mb-6">
                <p class="text-xs uppercase font-bold text-slate-400">Seu Ingresso</p>
                <p id="success-ticket" class="text-5xl font-black text-indigo-600">#000</p>
            </div>
            <button onclick="location.reload()" class="text-slate-400 underline font-bold text-sm">Comprar outro</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const countDisplay = document.getElementById('remaining-count');
        const progressBar = document.getElementById('progress-bar');
        const submitBtn = document.getElementById('submit-btn');

        async function updateStatus() {
            try {
                // Adicionamos um timestamp para evitar cache do navegador
                const response = await fetch(`${API_WEBHOOK_URL}?action=status&t=${Date.now()}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                if(data.remaining !== undefined) {
                    countDisplay.innerText = data.remaining;
                    progressBar.style.width = `${(data.remaining / TOTAL_TICKETS) * 100}%`;
                }
            } catch (err) {
                console.error("Erro ao ler status");
                countDisplay.innerText = "!!";
            }
        }

        document.getElementById('purchase-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('btn-loader').classList.remove('hidden');
            document.getElementById('error-message').classList.add('hidden');
            submitBtn.disabled = true;

            const nome = document.getElementById('nome').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const email = document.getElementById('email').value;

            try {
                const params = new URLSearchParams({ action: 'buy', nome, whatsapp, email });
                const response = await fetch(`${API_WEBHOOK_URL}?${params.toString()}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('error-text').innerText = data.error;
                    document.getElementById('error-message').classList.remove('hidden');
                } else if (data.success) {
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-container').classList.remove('hidden');
                    document.getElementById('success-ticket').innerText = '#' + String(data.ticketNumber).padStart(3, '0');
                }
            } catch (err) {
                document.getElementById('error-text').innerText = "Erro de comunicação. Verifique se clicou em 'Listen for test event' no n8n.";
                document.getElementById('error-message').classList.remove('hidden');
            } finally {
                document.getElementById('btn-loader').classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        updateStatus();
    </script>
</body>
</html>
